<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million Checkboxes</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #09090b;
            --surface: #18181b;
            --surface-raised: #27272a;
            --border: #3f3f46;
            --text: #fafafa;
            --muted: #a1a1aa;
            --accent: #22c55e;
            --accent-dim: rgba(34, 197, 94, 0.15);
            --error: #ef4444;
            --error-dim: rgba(239, 68, 68, 0.12);
            --error-border: rgba(239, 68, 68, 0.35);
            --radius: 12px;
            --cell: 28px;
            --gap: 8px;
            --row-h: calc(var(--cell) + var(--gap));
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        .top {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px 20px 16px;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.75rem, 5vw, 2.25rem);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        #alert {
            display: none;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--error-border);
            background: var(--error-dim);
            color: #fecaca;
            font-size: 0.9rem;
            line-height: 1.45;
            animation: slideIn 220ms ease;
        }

        #alert.visible {
            display: flex;
        }

        #alert-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            margin-top: 1px;
        }

        #alert-message {
            flex: 1;
        }

        #alert-dismiss {
            flex-shrink: 0;
            padding: 2px 8px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: #fca5a5;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
            transition: background 150ms ease;
        }

        #alert-dismiss:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 18px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .stats-label {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .stats-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .progress-track {
            flex: 1;
            height: 6px;
            border-radius: 999px;
            background: var(--surface-raised);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), #4ade80);
            transition: width 300ms ease;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 6px;
            box-shadow: 0 0 8px var(--accent);
        }

        .status-dot.disconnected {
            background: var(--error);
            box-shadow: 0 0 8px var(--error);
        }

        .grid-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 14px;
            padding: 0 20px 12px;
        }

        .grid-toolbar label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .grid-toolbar input[type="number"] {
            width: 110px;
            padding: 7px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-raised);
            color: var(--text);
            font-size: 0.85rem;
        }

        .grid-toolbar button {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-raised);
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
        }

        .grid-toolbar button:hover {
            border-color: var(--accent);
            background: rgba(34, 197, 94, 0.08);
        }

        .grid-toolbar button:active {
            transform: scale(0.98);
        }

        #position-label {
            margin-left: auto;
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
            color: var(--muted);
        }

        #scroll-spacer {
            position: relative;
            width: 100%;
        }

        #viewport {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            padding: 0 20px 48px;
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            will-change: transform;
        }

        .checkbox-row {
            display: grid;
            grid-template-columns: repeat(40, 1fr);
            gap: var(--gap);
            height: var(--cell);
        }

        input[type="checkbox"] {
            width: 100%;
            max-width: var(--cell);
            height: var(--cell);
            justify-self: center;
            margin: 0;
            appearance: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-raised);
            cursor: pointer;
            transition: border-color 150ms ease, background 150ms ease, transform 150ms ease, box-shadow 150ms ease;
            position: relative;
        }

        input[type="checkbox"]::after {
            content: "✓";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: transparent;
            transition: color 150ms ease;
        }

        input[type="checkbox"]:hover:not(:disabled) {
            border-color: var(--accent);
            transform: scale(1.08);
        }

        input[type="checkbox"]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        input[type="checkbox"]:checked {
            border-color: var(--accent);
            background: var(--accent-dim);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.25);
        }

        input[type="checkbox"]:checked::after {
            color: var(--accent);
        }

        input[type="checkbox"]:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        body.cooldown input[type="checkbox"] {
            opacity: 0.75;
        }

        #cooldown-hint {
            font-size: 0.85rem;
            color: #fca5a5;
        }

        #cooldown-hint:empty {
            display: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="top">
        <header>
            <h1>1 Million Checkboxes</h1>
            <p>Toggle any box — changes sync live across all connected clients.</p>
        </header>

        <div id="alert" role="alert" aria-live="assertive">
            <svg id="alert-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                    d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 6a.75.75 0 00-.75.75v3.5a.75.75 0 001.5 0v-3.5A.75.75 0 0010 6zm0 9a1 1 0 100-2 1 1 0 000 2z"
                    clip-rule="evenodd" />
            </svg>
            <span id="alert-message"></span>
            <button id="alert-dismiss" type="button" aria-label="Dismiss alert">&times;</button>
        </div>

        <div class="stats-bar">
            <div>
                <div class="stats-label">Checked</div>
                <div class="stats-value"><span id="checked-count">0</span> / <span id="total-count">1,000,000</span>
                </div>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="stats-label">
                <span class="status-dot" id="status-dot"></span>
                <span id="connection-status">Connecting…</span>
                <span id="cooldown-hint"></span>
            </div>
        </div>

        <div class="grid-toolbar">
            <label>
                Jump to #
                <input id="jump-input" type="number" min="1" max="1000000" placeholder="500000">
            </label>
            <button id="jump-btn" type="button">Go</button>
            <span id="position-label">Viewing around #1</span>
        </div>
    </div>

    <div id="scroll-spacer">
        <div id="viewport"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const COOLDOWN_STORAGE_KEY = "checkbox-cooldown-until";
        const CLIENT_ID_STORAGE_KEY = "checkbox-client-id";

        const CHECKBOX_COUNT = 1_000_000;
        const COLS = 40;
        const ROWS = CHECKBOX_COUNT / COLS;
        const ROW_HEIGHT = 36;
        const ROW_BUFFER = 6;
        const CHUNK_SIZE = 2000;
        const MAX_CACHED_CHUNKS = 40;
        const COOLDOWN_MS = 6000;

        function getClientId() {
            let clientId = localStorage.getItem(CLIENT_ID_STORAGE_KEY);
            if (!clientId) {
                clientId = crypto.randomUUID();
                localStorage.setItem(CLIENT_ID_STORAGE_KEY, clientId);
            }
            return clientId;
        }

        const socket = io({ auth: { clientId: getClientId() } });
        const scrollSpacer = document.getElementById("scroll-spacer");
        const viewport = document.getElementById("viewport");
        const alertEl = document.getElementById("alert");
        const alertMessageEl = document.getElementById("alert-message");
        const alertDismissEl = document.getElementById("alert-dismiss");
        const checkedCountEl = document.getElementById("checked-count");
        const totalCountEl = document.getElementById("total-count");
        const progressFillEl = document.getElementById("progress-fill");
        const statusDotEl = document.getElementById("status-dot");
        const connectionStatusEl = document.getElementById("connection-status");
        const cooldownHintEl = document.getElementById("cooldown-hint");
        const positionLabelEl = document.getElementById("position-label");
        const jumpInputEl = document.getElementById("jump-input");
        const jumpBtnEl = document.getElementById("jump-btn");

        let cooldownUntil = Number(localStorage.getItem(COOLDOWN_STORAGE_KEY)) || 0;
        let pendingToggle = null;
        let checkedCount = 0;
        let renderedStartRow = -1;
        let renderedEndRow = -1;
        let renderQueued = false;
        let loadToken = 0;
        const chunkCache = new Map();
        const chunkOrder = [];

        totalCountEl.textContent = CHECKBOX_COUNT.toLocaleString();
        scrollSpacer.style.height = `${ROWS * ROW_HEIGHT}px`;

        function showAlert(message) {
            alertMessageEl.textContent = message || "Something went wrong.";
            alertEl.classList.add("visible");
        }

        function hideAlert() {
            alertEl.classList.remove("visible");
        }

        alertDismissEl.addEventListener("click", hideAlert);

        function isOnCooldown() {
            return Date.now() < cooldownUntil;
        }

        function persistCooldown() {
            if (cooldownUntil && isOnCooldown()) {
                localStorage.setItem(COOLDOWN_STORAGE_KEY, String(cooldownUntil));
                return;
            }
            cooldownUntil = 0;
            localStorage.removeItem(COOLDOWN_STORAGE_KEY);
        }

        function syncCooldownUI() {
            if (cooldownUntil && Date.now() >= cooldownUntil) {
                cooldownUntil = 0;
                localStorage.removeItem(COOLDOWN_STORAGE_KEY);
            }
            document.body.classList.toggle("cooldown", isOnCooldown());
            cooldownHintEl.textContent = isOnCooldown()
                ? ` · wait ${Math.ceil((cooldownUntil - Date.now()) / 1000)}s`
                : "";
        }

        function startCooldown(retryAfter) {
            cooldownUntil = Math.max(cooldownUntil, retryAfter ?? Date.now() + COOLDOWN_MS);
            persistCooldown();
            syncCooldownUI();
        }

        syncCooldownUI();

        function updateStats() {
            checkedCountEl.textContent = checkedCount.toLocaleString();
            progressFillEl.style.width = `${(checkedCount / CHECKBOX_COUNT) * 100}%`;
        }

        function setConnectionStatus(connected) {
            statusDotEl.classList.toggle("disconnected", !connected);
            connectionStatusEl.textContent = connected ? "Live" : "Disconnected";
        }

        function indexToRowCol(index) {
            return { row: Math.floor(index / COLS), col: index % COLS };
        }

        function rowColToIndex(row, col) {
            return row * COLS + col;
        }

        function chunkKeyForIndex(index) {
            return Math.floor(index / CHUNK_SIZE) * CHUNK_SIZE;
        }

        function touchChunk(key) {
            const i = chunkOrder.indexOf(key);
            if (i !== -1) chunkOrder.splice(i, 1);
            chunkOrder.push(key);
            while (chunkOrder.length > MAX_CACHED_CHUNKS) {
                chunkCache.delete(chunkOrder.shift());
            }
        }

        function getCachedValue(index) {
            const key = chunkKeyForIndex(index);
            const chunk = chunkCache.get(key);
            return chunk ? (chunk[index - key] ?? false) : false;
        }

        function setCachedValue(index, checked) {
            const key = chunkKeyForIndex(index);
            const chunk = chunkCache.get(key);
            if (chunk) chunk[index - key] = checked;
        }

        async function fetchChunk(chunkStart) {
            if (chunkCache.has(chunkStart)) {
                touchChunk(chunkStart);
                return chunkCache.get(chunkStart);
            }
            const count = Math.min(CHUNK_SIZE, CHECKBOX_COUNT - chunkStart);
            const response = await fetch(`/checkboxes?start=${chunkStart}&count=${count}`);
            const data = await response.json();
            chunkCache.set(chunkStart, data.checkboxes ?? []);
            touchChunk(chunkStart);
            return chunkCache.get(chunkStart);
        }

        async function ensureChunksForRange(startIndex, endIndex) {
            const first = chunkKeyForIndex(startIndex);
            const last = chunkKeyForIndex(Math.max(0, endIndex - 1));
            const token = ++loadToken;

            for (let s = first; s <= last; s += CHUNK_SIZE) {
                await fetchChunk(s);
                if (token !== loadToken) return false;
            }
            return true;
        }

        function getGridScrollTop() {
            const top = scrollSpacer.getBoundingClientRect().top + window.scrollY;
            return Math.max(0, window.scrollY - top);
        }

        function getVisibleRowRange() {
            const scrollTop = getGridScrollTop();
            const viewHeight = window.innerHeight;
            const startRow = Math.floor(scrollTop / ROW_HEIGHT);
            const endRow = Math.ceil((scrollTop + viewHeight) / ROW_HEIGHT);
            return {
                start: Math.max(0, startRow - ROW_BUFFER),
                end: Math.min(ROWS, endRow + ROW_BUFFER),
            };
        }

        function updatePositionLabel(startRow) {
            const centerIndex = rowColToIndex(startRow + 3, 0);
            positionLabelEl.textContent = `Viewing around #${(centerIndex + 1).toLocaleString()}`;
        }

        function requestToggle(index) {
            syncCooldownUI();
            if (isOnCooldown()) {
                showAlert("Please wait before toggling again.");
                return;
            }
            const checked = !getCachedValue(index);
            pendingToggle = { index, checked };
            socket.emit("client:checkbox:change", { index, checked });
        }

        function applyCheckboxChange(index, checked) {
            const previous = getCachedValue(index);
            if (previous !== checked) {
                checkedCount += checked ? 1 : -1;
                updateStats();
            }
            setCachedValue(index, checked);

            const input = viewport.querySelector(`[data-index="${index}"]`);
            if (input) input.checked = checked;
        }

        async function renderVisibleRows() {
            renderQueued = false;
            const { start, end } = getVisibleRowRange();

            if (start === renderedStartRow && end === renderedEndRow) return;

            renderedStartRow = start;
            renderedEndRow = end;

            const startIndex = start * COLS;
            const endIndex = Math.min(CHECKBOX_COUNT, end * COLS);
            const ready = await ensureChunksForRange(startIndex, endIndex);
            if (!ready) return;

            viewport.style.transform = `translateY(${start * ROW_HEIGHT}px)`;

            const fragment = document.createDocumentFragment();
            for (let row = start; row < end; row++) {
                const rowEl = document.createElement("div");
                rowEl.className = "checkbox-row";

                for (let col = 0; col < COLS; col++) {
                    const index = rowColToIndex(row, col);
                    const input = document.createElement("input");
                    input.type = "checkbox";
                    input.dataset.index = String(index);
                    input.checked = getCachedValue(index);
                    input.title = `#${(index + 1).toLocaleString()}`;
                    rowEl.appendChild(input);
                }
                fragment.appendChild(rowEl);
            }

            viewport.replaceChildren(fragment);
            updatePositionLabel(start);
        }

        function queueRender() {
            if (renderQueued) return;
            renderQueued = true;
            requestAnimationFrame(() => {
                renderVisibleRows().catch(() => showAlert("Failed to load this section."));
            });
        }

        function scrollToIndex(index) {
            const clamped = Math.max(0, Math.min(CHECKBOX_COUNT - 1, index));
            const { row } = indexToRowCol(clamped);
            const gridTop = scrollSpacer.getBoundingClientRect().top + window.scrollY;
            window.scrollTo({ top: gridTop + row * ROW_HEIGHT - ROW_HEIGHT * 2, behavior: "smooth" });
            renderedStartRow = -1;
            renderedEndRow = -1;
            queueRender();
        }

        viewport.addEventListener("change", (event) => {
            const input = event.target;
            if (!(input instanceof HTMLInputElement) || input.type !== "checkbox") return;

            input.checked = !input.checked;
            requestToggle(Number(input.dataset.index));
        });

        socket.on("connect", () => setConnectionStatus(true));
        socket.on("disconnect", () => setConnectionStatus(false));

        socket.on("server:checkbox:change", ({ index, checked }) => {
            applyCheckboxChange(index, checked);
            if (pendingToggle?.index === index && pendingToggle.checked === checked) {
                startCooldown(Date.now() + COOLDOWN_MS);
                pendingToggle = null;
                hideAlert();
            }
        });

        socket.on("server:error", (data) => {
            pendingToggle = null;
            showAlert(data.error);
            if (data.retryAfter) startCooldown(data.retryAfter);
        });

        window.addEventListener("scroll", queueRender, { passive: true });
        window.addEventListener("resize", () => {
            renderedStartRow = -1;
            renderedEndRow = -1;
            queueRender();
        });

        jumpBtnEl.addEventListener("click", () => {
            const value = Number(jumpInputEl.value);
            if (!Number.isInteger(value) || value < 1 || value > CHECKBOX_COUNT) {
                showAlert(`Enter a number between 1 and ${CHECKBOX_COUNT.toLocaleString()}.`);
                return;
            }
            hideAlert();
            scrollToIndex(value - 1);
        });

        jumpInputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") jumpBtnEl.click();
        });

        window.addEventListener("load", async () => {
            try {
                const stats = await (await fetch("/checkboxes/stats")).json();
                checkedCount = stats.checked ?? 0;
                updateStats();
                await renderVisibleRows();
            } catch {
                showAlert("Could not reach the server. Please refresh the page.");
            }
        });
    </script>
</body>

</html>
